<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="560" fill="#f7f7f7" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#3c2e24" letter-spacing="1">Base de données — Modèle Entité-Relation</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#5f5a54">Projet Quai Antique · PostgreSQL / Supabase</text>

  <!-- ─────────────── TABLE users ─────────────── -->
  <!-- Shadow -->
  <rect x="53" y="93" width="300" height="370" rx="10" fill="#c5baa4" opacity="0.4"/>
  <!-- Card -->
  <rect x="50" y="90" width="300" height="370" rx="10" fill="#ffffff" stroke="#e4ded5" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="50" y="90" width="300" height="44" rx="10" fill="#3c2e24"/>
  <rect x="50" y="114" width="300" height="20" fill="#3c2e24"/>
  <text x="200" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="1">users</text>
  <text x="200" y="130" text-anchor="middle" font-size="10" fill="#c5baa4">Table utilisateurs</text>

  <!-- Rows users -->
  <!-- id -->
  <rect x="50" y="134" width="300" height="34" fill="#fdf8f1"/>
  <rect x="62" y="143" width="28" height="16" rx="3" fill="#9b6a22"/>
  <text x="76" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">PK</text>
  <text x="100" y="156" font-size="13" font-weight="600" fill="#3c2e24">id</text>
  <text x="346" y="156" text-anchor="end" font-size="11" fill="#5f5a54">SERIAL</text>

  <!-- first_name -->
  <rect x="50" y="168" width="300" height="32" fill="#ffffff"/>
  <text x="100" y="189" font-size="13" fill="#3c2e24">first_name</text>
  <text x="346" y="189" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(100) NN</text>

  <!-- last_name -->
  <rect x="50" y="200" width="300" height="32" fill="#fdf8f1"/>
  <text x="100" y="221" font-size="13" fill="#3c2e24">last_name</text>
  <text x="346" y="221" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(100) NN</text>

  <!-- email -->
  <rect x="50" y="232" width="300" height="32" fill="#ffffff"/>
  <rect x="62" y="241" width="26" height="16" rx="3" fill="#c5baa4"/>
  <text x="75" y="253" text-anchor="middle" font-size="9" font-weight="700" fill="#3c2e24">UQ</text>
  <text x="100" y="253" font-size="13" fill="#3c2e24">email</text>
  <text x="346" y="253" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(255) NN</text>

  <!-- password_hash -->
  <rect x="50" y="264" width="300" height="32" fill="#fdf8f1"/>
  <text x="100" y="285" font-size="13" fill="#3c2e24">password_hash</text>
  <text x="346" y="285" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(255) NN</text>

  <!-- role -->
  <rect x="50" y="296" width="300" height="34" fill="#ffffff"/>
  <text x="100" y="317" font-size="13" fill="#3c2e24">role</text>
  <text x="100" y="328" font-size="10" fill="#9b6a22">'user' · 'admin'</text>
  <text x="346" y="317" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(20) NN</text>
  <text x="346" y="328" text-anchor="end" font-size="10" fill="#9b6a22">DEFAULT 'user'</text>

  <!-- created_at -->
  <rect x="50" y="330" width="300" height="32" fill="#fdf8f1"/>
  <text x="100" y="351" font-size="13" fill="#3c2e24">created_at</text>
  <text x="346" y="351" text-anchor="end" font-size="11" fill="#5f5a54">TIMESTAMP NN</text>

  <!-- Bottom border rounded -->
  <rect x="50" y="430" width="300" height="30" rx="10" fill="#ffffff" stroke="#e4ded5" stroke-width="1.5"/>
  <rect x="50" y="420" width="300" height="20" fill="#ffffff"/>
  <text x="200" y="450" text-anchor="middle" font-size="11" fill="#5f5a54">7 colonnes · bcrypt hash</text>

  <!-- ─────────────── TABLE reservations ─────────────── -->
  <!-- Shadow -->
  <rect x="553" y="93" width="310" height="432" rx="10" fill="#c5baa4" opacity="0.4"/>
  <!-- Card -->
  <rect x="550" y="90" width="310" height="432" rx="10" fill="#ffffff" stroke="#e4ded5" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="550" y="90" width="310" height="44" rx="10" fill="#9b6a22"/>
  <rect x="550" y="114" width="310" height="20" fill="#9b6a22"/>
  <text x="705" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="1">reservations</text>
  <text x="705" y="130" text-anchor="middle" font-size="10" fill="#fdf8f1">Table réservations</text>

  <!-- Rows reservations -->
  <!-- id -->
  <rect x="550" y="134" width="310" height="34" fill="#fdf8f1"/>
  <rect x="562" y="143" width="28" height="16" rx="3" fill="#3c2e24"/>
  <text x="576" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">PK</text>
  <text x="600" y="156" font-size="13" font-weight="600" fill="#3c2e24">id</text>
  <text x="856" y="156" text-anchor="end" font-size="11" fill="#5f5a54">SERIAL</text>

  <!-- first_name -->
  <rect x="550" y="168" width="310" height="32" fill="#ffffff"/>
  <text x="600" y="189" font-size="13" fill="#3c2e24">first_name</text>
  <text x="856" y="189" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(100) NN</text>

  <!-- last_name -->
  <rect x="550" y="200" width="310" height="32" fill="#fdf8f1"/>
  <text x="600" y="221" font-size="13" fill="#3c2e24">last_name</text>
  <text x="856" y="221" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(100) NN</text>

  <!-- email -->
  <rect x="550" y="232" width="310" height="32" fill="#ffffff"/>
  <text x="600" y="253" font-size="13" fill="#3c2e24">email</text>
  <text x="856" y="253" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(255) NN</text>

  <!-- reservation_date -->
  <rect x="550" y="264" width="310" height="32" fill="#fdf8f1"/>
  <text x="600" y="285" font-size="13" fill="#3c2e24">reservation_date</text>
  <text x="856" y="285" text-anchor="end" font-size="11" fill="#5f5a54">DATE NN</text>

  <!-- reservation_time -->
  <rect x="550" y="296" width="310" height="32" fill="#ffffff"/>
  <text x="600" y="317" font-size="13" fill="#3c2e24">reservation_time</text>
  <text x="856" y="317" text-anchor="end" font-size="11" fill="#5f5a54">TIME NN</text>

  <!-- guests -->
  <rect x="550" y="328" width="310" height="34" fill="#fdf8f1"/>
  <text x="600" y="349" font-size="13" fill="#3c2e24">guests</text>
  <text x="600" y="360" font-size="10" fill="#9b6a22">CHECK (guests &gt; 0)</text>
  <text x="856" y="349" text-anchor="end" font-size="11" fill="#5f5a54">INTEGER NN</text>

  <!-- allergies -->
  <rect x="550" y="362" width="310" height="32" fill="#ffffff"/>
  <text x="600" y="383" font-size="13" fill="#3c2e24">allergies</text>
  <text x="856" y="383" text-anchor="end" font-size="11" fill="#5f5a54">TEXT (nullable)</text>

  <!-- status -->
  <rect x="550" y="394" width="310" height="36" fill="#fdf8f1"/>
  <text x="600" y="415" font-size="13" fill="#3c2e24">status</text>
  <text x="600" y="427" font-size="10" fill="#9b6a22">'pending' · 'confirmed' · 'cancelled'</text>
  <text x="856" y="415" text-anchor="end" font-size="11" fill="#5f5a54">VARCHAR(30) NN</text>

  <!-- created_at -->
  <rect x="550" y="430" width="310" height="32" fill="#ffffff"/>
  <text x="600" y="451" font-size="13" fill="#3c2e24">created_at</text>
  <text x="856" y="451" text-anchor="end" font-size="11" fill="#5f5a54">TIMESTAMP NN</text>

  <!-- Bottom -->
  <rect x="550" y="490" width="310" height="32" rx="10" fill="#ffffff" stroke="#e4ded5" stroke-width="1.5"/>
  <rect x="550" y="480" width="310" height="20" fill="#ffffff"/>
  <text x="705" y="512" text-anchor="middle" font-size="11" fill="#5f5a54">10 colonnes · statut par défaut: pending</text>

  <!-- ─────────────── RELATION ─────────────── -->
  <!-- Line from users to reservations (dashed — relation prévue) -->
  <line x1="350" y1="310" x2="410" y2="310" stroke="#9b6a22" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="410" y1="280" x2="410" y2="390" stroke="#9b6a22" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="410" y1="335" x2="550" y2="335" stroke="#9b6a22" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Crow's foot — many side (reservations) -->
  <line x1="546" y1="328" x2="536" y2="322" stroke="#9b6a22" stroke-width="2"/>
  <line x1="546" y1="328" x2="536" y2="335" stroke="#9b6a22" stroke-width="2"/>
  <line x1="546" y1="328" x2="536" y2="342" stroke="#9b6a22" stroke-width="2"/>
  <!-- One side (users) -->
  <line x1="354" y1="304" x2="354" y2="317" stroke="#9b6a22" stroke-width="2"/>

  <!-- Relation label -->
  <rect x="365" y="295" width="90" height="32" rx="6" fill="#ffffff" stroke="#e4ded5" stroke-width="1"/>
  <text x="410" y="309" text-anchor="middle" font-size="10" fill="#9b6a22" font-weight="600">1 → N prévu</text>
  <text x="410" y="321" text-anchor="middle" font-size="9" fill="#5f5a54">user_id FK (v2)</text>

  <!-- Legend -->
  <rect x="50" y="500" width="280" height="48" rx="8" fill="#fdf8f1" stroke="#e4ded5" stroke-width="1"/>
  <rect x="62" y="513" width="22" height="13" rx="3" fill="#9b6a22"/>
  <text x="74" y="524" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">PK</text>
  <text x="92" y="524" font-size="10" fill="#3c2e24">Clé primaire</text>
  <rect x="155" y="513" width="22" height="13" rx="3" fill="#c5baa4"/>
  <text x="166" y="524" text-anchor="middle" font-size="9" font-weight="700" fill="#3c2e24">UQ</text>
  <text x="184" y="524" font-size="10" fill="#3c2e24">Unique</text>
  <text x="62" y="540" font-size="10" fill="#5f5a54">NN = NOT NULL</text>
  <line x1="155" y1="534" x2="185" y2="534" stroke="#9b6a22" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="192" y="538" font-size="10" fill="#5f5a54">Relation prévue</text>

</svg>
