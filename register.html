<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription - Quai Antique</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">Quai Antique</a>
      <nav class="main-nav" aria-label="Navigation principale">
        <a href="index.html">Accueil</a>
        <a href="gallery.html">Galerie</a>
        <a href="menu.html">La carte</a>
        <a href="reservation.html">Les reservations</a>
        <a href="login.html">Mon compte</a>
      </nav>
    </header>

    <main>
      <section class="hero hero-page">
        <h1>Inscription</h1>
      </section>

      <section class="content-page">
        <form class="form-panel" id="registerForm">
          <div class="form-row">
            <label for="lastname">Nom</label>
            <input id="lastname" type="text" />
          </div>
          <div class="form-row">
            <label for="firstname">Prénom</label>
            <input id="firstname" type="text" />
          </div>
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" type="email" />
          </div>
          <div class="form-row">
            <label for="password">Mot de passe</label>
            <input id="password" type="password" />
          </div>
          <div class="form-actions">
            <button class="btn" type="submit">Inscription</button>
          </div>
          <p class="form-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <section>
        <h2>Nos horaires</h2>
        <p>Du mardi au dimanche 12:00-14:00 18:00-23:00</p>
      </section>
      <section>
        <h2>Quai Antique</h2>
        <p>5 rue de la route</p>
        <p>31150 Ville</p>
        <p>04 01 01 01 01</p>
      </section>
      <section>
        <h2>Contact</h2>
        <p>contact@quaiantique.com</p>
      </section>
    </footer>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
